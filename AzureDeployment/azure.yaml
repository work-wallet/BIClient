# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: workwallet-bi-client
metadata:
  template: workwallet-bi-client@0.0.1
services:
  function:
    project: ../SampleCode/WorkWallet.BI.ClientFunction
    language: dotnet
    host: function
hooks:
  postprovision:
    # After provisioning, Azure RBAC role assignments (Storage Blob Data Owner and Key Vault
    # role assignments) can take up to 2 minutes to propagate. Without this pause, azd's zip
    # deploy fails with a 403 because the function app's managed identity doesn't yet have
    # blob write access. The tag-based resource discovery delay is also covered by this wait.
    windows:
      shell: pwsh
      run: Start-Sleep -Seconds 60
    posix:
      shell: sh
      run: sleep 60
  postdeploy:
    # Flex Consumption apps take a few seconds to start after a fresh deploy.
    # Without this pause, azd's trigger-sync check hits a 503 (site unavailable).
    windows:
      shell: pwsh
      run: Start-Sleep -Seconds 30
    posix:
      shell: sh
      run: sleep 30
